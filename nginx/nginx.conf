events {
    worker_connections 1024;
}

http {
    # ─── Upstream: 3 Node.js instances with sticky sessions ─────────
    upstream editor_backend {
        # ip_hash ensures the same client IP always routes to the same
        # backend instance. This is CRITICAL for WebSocket connections
        # because the HTTP→WS upgrade handshake must complete on the
        # same server that will hold the persistent connection.
        ip_hash;

        server app1:3001 max_fails=3 fail_timeout=30s;
        server app2:3001 max_fails=3 fail_timeout=30s;
        server app3:3001 max_fails=3 fail_timeout=30s;
    }

    # ─── Logging ────────────────────────────────────────────────────
    log_format upstream_log '$remote_addr - [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            'upstream=$upstream_addr '
                            'response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log upstream_log;

    # ─── Server Block ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Main Application (HTTP + WebSocket) ──
        location / {
            proxy_pass http://editor_backend;

            # Required for WebSocket upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Pass real client info to backends
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeouts for WebSocket (24 hours)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Buffering off for real-time
            proxy_buffering off;
            proxy_cache off;
        }

        # ── NGINX Health Check ──
        location /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── NGINX Status (for monitoring) ──
        location /nginx-status {
            stub_status on;
            access_log off;
        }
    }
}

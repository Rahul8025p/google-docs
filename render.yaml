# render.yaml — Render Blueprint
# Deploy via: https://render.com/deploy
# Or connect your GitHub repo in the Render dashboard

services:
  - type: web
    name: collab-editor
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAX_CONNECTIONS
        value: "100"
      - key: ALLOWED_ORIGINS
        value: "*"

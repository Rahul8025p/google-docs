global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ─── Node.js App Instances ──────────────────────────────
  - job_name: 'collab-editor'
    static_configs:
      - targets:
          - 'app1:3001'
          - 'app2:3001'
          - 'app3:3001'
        labels:
          service: 'collab-editor'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ─── Prometheus Self-Monitoring ─────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
